<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>憂娘駕駛 Outdoor｜官方網站</title>
  <style>
    :root{--bg:#0b1220;--card:#121b2e;--pri:#3b82f6;--txt:#e5edff;--muted:#9db2d8}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#09101d,#0e1628);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .wrap{max-width:1040px;margin:0 auto;padding:20px}
    .hero{padding:40px 0 20px}
    h1{font-size:clamp(30px,6vw,56px);margin:0 0 12px}
    p{line-height:1.6;color:var(--muted)}
    .btn{display:inline-block;background:var(--pri);color:#fff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:700}
    .card{background:var(--card);border:1px solid #22304d;border-radius:16px;padding:14px}
    .video{position:relative;padding-top:56.25%;overflow:hidden;border-radius:14px}
    .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
    .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-top:16px}
    .item{background:#0f1a30;border:1px solid #22304d;padding:14px;border-radius:12px}
    footer{padding:30px 0;color:#8ea3c7;text-align:center;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>憂娘駕駛 Outdoor</h1>
      <p>台灣露營車與停車冷氣技術分享。這是公司官方介紹頁，重點展示最新 YouTube 影片與核心服務。</p>
      <a class="btn" href="https://youtu.be/qd71u-h_54M?si=VyXTtdIzbVvesdiv" target="_blank" rel="noopener">觀看最新影片</a>
    </section>

    <section class="card">
      <div class="video">
        <iframe src="https://www.youtube.com/embed/qd71u-h_54M" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <p style="margin:12px 4px 2px">最新技術影片：駐車冷氣（靜音、涼爽、無痕安裝）與露營車實車案例。</p>
    </section>

    <section class="grid">
      <div class="item"><h3>技術重點</h3><p>緩啟動壓縮機、低噪音體驗、長時間舒適降溫。</p></div>
      <div class="item"><h3>車型案例</h3><p>VW T6.1 California Ocean、賓士 Marco Polo 等露營車系。</p></div>
      <div class="item"><h3>服務內容</h3><p>露營車相關改裝建議、停車冷氣方案、實戰測試分享。</p></div>
    </section>

    <footer>
      © 2026 憂娘駕駛 Outdoor · YouTube: <a href="https://www.youtube.com/@taiwango2020" target="_blank" rel="noopener" style="color:#9ec0ff">@taiwango2020</a>
    </footer>
  </div>
</body>
</html>
